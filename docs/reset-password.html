<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fjernskrivebord - Ny adgangskode</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥️</text></svg>">
  <link rel="stylesheet" href="css/styles.css?v=3">
  <link rel="stylesheet" href="css/modern.css?v=6">
  <link rel="stylesheet" href="css/redesign.css?v=4">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-page">
  <div class="animated-bg">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>

  <div class="login-container">
    <div class="login-card glass-card">
      <div class="login-logo">
        <div class="logo-glow"></div>
        <span class="logo-icon">🔐</span>
      </div>
      <h1>Ny adgangskode</h1>
      <p class="subtitle">Indtast din nye adgangskode nedenfor</p>

      <form id="newPasswordForm" class="auth-form">
        <div class="form-group">
          <label for="newPassword">Ny adgangskode</label>
          <input type="password" id="newPassword" placeholder="••••••••" required autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Bekræft adgangskode</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required autocomplete="new-password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" id="savePasswordBtn">
          <span>Gem ny adgangskode</span>
        </button>
      </form>

      <div id="resetMessage" class="message" style="display: none;"></div>

      <div class="login-footer">
        <div class="security-badges">
          <span class="badge"><i class="fas fa-lock"></i> Ende-til-ende krypteret</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=3"></script>
  <script>
    const form = document.getElementById('newPasswordForm');
    const msg = document.getElementById('resetMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('newPassword').value;
      const pw2 = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('savePasswordBtn');

      msg.style.display = 'none';

      if (pw !== pw2) {
        msg.className = 'message error';
        msg.textContent = 'Adgangskoderne stemmer ikke overens';
        msg.style.display = 'block';
        return;
      }
      if (pw.length < 6) {
        msg.className = 'message error';
        msg.textContent = 'Adgangskoden skal være mindst 6 tegn';
        msg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span>Gemmer...</span>';

      try {
        const { error } = await supabase.auth.updateUser({ password: pw });
        if (error) throw error;

        msg.className = 'message success';
        msg.textContent = 'Adgangskode opdateret! Du sendes til login...';
        msg.style.display = 'block';
        form.style.display = 'none';

        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } catch (error) {
        msg.className = 'message error';
        msg.textContent = 'Kunne ikke opdatere adgangskode: ' + error.message;
        msg.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<span>Gem ny adgangskode</span>';
      }
    });
  </script>
</body>
</html>
