<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Supabase Relay Remote Desktop Dashboard v3.0</title>
    
    <!-- CRITICAL FIX: Direct inline script approach for reliable Supabase library loading -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js" onload="console.log('✅ Supabase library loaded via CDN')" onerror="console.error('❌ CDN loading failed')"></script>
    <script>
        // CRITICAL FIX: Immediate verification and fallback with retry logic
        function ensureSupabaseLoaded() {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                const maxAttempts = 100; // 10 seconds max wait
                
                function checkSupabase() {
                    attempts++;
                    console.log(`🔍 Checking Supabase library... (${attempts}/${maxAttempts})`);
                    
                    if (typeof window.supabase !== 'undefined') {
                        console.log('✅ Supabase library confirmed loaded');
                        resolve(true);
                        return;
                    }
                    
                    if (attempts >= maxAttempts) {
                        console.error('❌ Supabase library failed to load after 10 seconds');
                        reject(new Error('Supabase library loading timeout'));
                        return;
                    }
                    
                    setTimeout(checkSupabase, 100);
                }
                
                checkSupabase();
            });
        }
        
        // Start checking immediately
        ensureSupabaseLoaded().then(() => {
            console.log('🚀 Supabase library ready - initializing dashboard...');
            if (typeof initDashboard === 'function') {
                initDashboard();
            }
        }).catch(error => {
            console.error('❌ Failed to load Supabase library:', error);
        });
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; color: #333;
        }
        
        .container {
            max-width: 1400px; margin: 0 auto; padding: 20px;
            background: rgba(255,255,255,0.95); border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); min-height: calc(100vh - 40px);
        }
        
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid #e5e7eb; margin-bottom: 30px;
        }
        
        .header h1 { font-size: 2rem; color: #4f46e5; }
        
        .main-content {
            display: grid; grid-template-columns: 350px 1fr; gap: 30px; height: 600px;
        }
        
        .device-panel {
            background: white; border-radius: 15px; padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); overflow-y: auto;
        }
        
        .device-item {
            background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px;
            padding: 15px; margin-bottom: 15px; cursor: pointer; transition: all 0.3s;
        }
        
        .device-item:hover { background: #e2e8f0; transform: translateY(-2px); }
        .device-item.selected { background: #4f46e5; color: white; }
        
        .device-name { font-weight: 600; font-size: 1.1rem; margin-bottom: 5px; }
        .device-info { font-size: 0.9rem; opacity: 0.7; }
        .device-status { 
            display: inline-block; padding: 3px 8px; border-radius: 12px; 
            font-size: 0.8rem; margin-top: 8px;
        }
        .status-online { background: #10b981; color: white; }
        .status-offline { background: #ef4444; color: white; }
        .status-relay { background: #8b5cf6; color: white; }
        
        .control-panel {
            background: white; border-radius: 15px; padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column;
        }
        
        .connection-status {
            padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center;
            font-weight: 600; font-size: 1.1rem;
        }
        .status-disconnected { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .status-connecting { background: #fef3c7; color: #d97706; border: 1px solid #fed7aa; }
        .status-connected { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        
        .controls {
            display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer;
            font-size: 14px; font-weight: 600; transition: all 0.3s;
        }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .screen-container {
            flex: 1; border: 2px solid #e5e7eb; border-radius: 10px; overflow: hidden;
            background: #000; display: flex; align-items: center; justify-content: center;
        }
        
        .screen {
            max-width: 100%; max-height: 100%; object-fit: contain;
        }
        
        .no-screen {
            color: #6b7280; font-size: 1.2rem; text-align: center;
        }
        
        .log {
            background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px;
            padding: 15px; height: 150px; overflow-y: auto; font-family: monospace;
            font-size: 12px; margin-top: 20px;
        }
        
        .relay-indicator {
            background: #8b5cf6; color: white; padding: 5px 10px; border-radius: 15px;
            font-size: 0.8rem; margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Supabase Relay Remote Desktop Dashboard v3.0</h1>
            <div class="relay-indicator">
                ☁️ Pure Cloud Relay
            </div>
            <div id="stats">
                <span id="deviceCount">Loading devices...</span>
            </div>
        </div>
        
        <div class="main-content">
            <div class="device-panel">
                <h3 style="margin-bottom: 15px;">📱 Available Devices</h3>
                <div id="deviceList">
                    <div style="text-align: center; color: #6b7280; padding: 20px;">
                        Loading devices...
                    </div>
                </div>
            </div>
            
            <div class="control-panel">
                <div id="connectionStatus" class="connection-status status-disconnected">
                    🔌 Not Connected
                </div>
                
                <div class="controls">
                    <button id="connectBtn" class="btn btn-primary" onclick="connectToDevice()">Connect</button>
                    <button id="screenBtn" class="btn btn-success" onclick="startScreenShare()" disabled>Start Screen</button>
                    <button id="stopBtn" class="btn btn-danger" onclick="stopScreenShare()" disabled>Stop</button>
                </div>
                
                <div class="screen-container">
                    <canvas id="screen" class="screen" style="display: none;"></canvas>
                    <div id="noScreen" class="no-screen">
                        Select a device and click Connect to start remote control
                    </div>
                </div>
                
                <div id="log" class="log"></div>
            </div>
        </div>
    </div>

    <script>
        // Supabase configuration
        const supabaseUrl = 'https://ptrtibzwokjcjjxvjpin.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0cnRpYnp3b2tqY2pqeHZqcGluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ0MzE1NzEsImV4cCI6MjA3MDAwNzU3MX0.DPNxkQul1-13tqJ89mqYJAx7NSJjabOP4q8c6KgOnWk';
        
        // CRITICAL FIX: Proper Supabase client initialization with global scope access
        let supabase = null;
        
        function initializeSupabase() {
            try {
                console.log('🔌 Initializing Supabase client...');
                
                if (typeof window.supabase === 'undefined') {
                    console.error('❌ Supabase library not loaded');
                    return false;
                }
                
                // CRITICAL FIX: Assign to global variable AND window object for full accessibility
                supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                window.supabaseClient = supabase; // Also expose on window for debugging/testing
                
                console.log('✅ Supabase client initialized successfully');
                console.log('🔍 Global supabase variable:', typeof supabase);
                console.log('🔍 Window supabaseClient:', typeof window.supabaseClient);
                return true;
                
            } catch (error) {
                console.error('❌ Supabase initialization failed:', error);
                return false;
            }
        }
        
        // Global state
        let devices = [];
        let selectedDevice = null;
        let realtimeChannel = null;
        let isConnected = false;
        let isScreenSharing = false;
        
        // CRITICAL FIX: Direct dashboard initialization function
        async function initDashboard() {
            console.log('🚀 Initializing Supabase Relay Dashboard...');
            
            // Verify Supabase library is loaded
            if (typeof window.supabase === 'undefined') {
                console.error('❌ Supabase library not available during initialization');
                return;
            }
            
            // Initialize Supabase client directly
            try {
                console.log('🔌 Creating Supabase client...');
                
                const supabaseUrl = 'https://ptrtibzwokjcjjxvjpin.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0cnRpYnp3b2tqY2pqeHZqcGluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ0MzE1NzEsImV4cCI6MjA3MDAwNzU3MX0.DPNxkQul1-13tqJ89mqYJAx7NSJjabOP4q8c6KgOnWk';
                
                // Create client and assign to global variables
                window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
                window.globalSupabase = window.supabaseClient; // Additional global reference
                
                console.log('✅ Supabase client created successfully');
                console.log('🔍 Client type:', typeof window.supabaseClient);
                
                // Load devices and setup
                await loadDevicesDirectly();
                setupRealtimeUpdatesDirectly();
                
                console.log('✅ Dashboard initialized successfully');
                
            } catch (error) {
                console.error('❌ Dashboard initialization failed:', error);
            }
        }
        
        // Legacy initialization function (kept for compatibility)
        async function init() {
            console.log('🔄 Legacy init called - redirecting to initDashboard...');
            await initDashboard();
        }
        
        // CRITICAL FIX: Direct device loading using window.supabaseClient
        async function loadDevicesDirectly() {
            try {
                console.log('📡 Loading devices using direct Supabase client...');
                
                const { data, error } = await window.supabaseClient
                    .from('remote_devices')
                    .select('*')
                    .order('last_seen', { ascending: false });
                    
                if (error) {
                    console.error('❌ Device loading error:', error);
                    throw error;
                }
                
                console.log('✅ Raw device data loaded:', data?.length || 0, 'devices');
                
                // Filter stale devices (inactive > 5 minutes)
                const now = Date.now();
                devices = data.filter(device => {
                    const lastSeen = new Date(device.last_seen).getTime();
                    const minutesAgo = (now - lastSeen) / (1000 * 60);
                    
                    // Override is_online if device is stale
                    if (minutesAgo > 5) {
                        device.is_online = false;
                    }
                    
                    return true; // Show all devices, but mark stale ones as offline
                });
                
                console.log('📊 Processed devices:', devices.length, 'total');
                console.log('🟢 Online devices:', devices.filter(d => d.is_online).length);
                
                updateDeviceList();
                updateStats();
                
            } catch (error) {
                console.error('❌ Error loading devices directly:', error.message);
            }
        }
        
        // Legacy device loading function (kept for compatibility)
        async function loadDevices() {
            console.log('🔄 Legacy loadDevices called - redirecting to loadDevicesDirectly...');
            await loadDevicesDirectly();
        }
        
        // Update device list UI
        function updateDeviceList() {
            const deviceList = document.getElementById('deviceList');
            
            if (devices.length === 0) {
                deviceList.innerHTML = `
                    <div style="text-align: center; color: #6b7280; padding: 20px;">
                        No devices found. Start a Supabase Relay Agent to see devices here.
                    </div>
                `;
                return;
            }
            
            deviceList.innerHTML = devices.map(device => {
                const isRelay = device.mode === 'supabase-relay';
                const statusClass = device.is_online ? 'status-online' : 'status-offline';
                const statusText = device.is_online ? '🟢 Online' : '🔴 Offline';
                const relayBadge = isRelay ? '<span class="status-relay">☁️ Relay</span>' : '';
                
                return `
                    <div class="device-item ${selectedDevice?.device_id === device.device_id ? 'selected' : ''}" 
                         onclick="selectDevice('${device.device_id}')">
                        <div class="device-name">${device.device_name}</div>
                        <div class="device-info">
                            ${device.platform || 'unknown'} • ${device.architecture || 'unknown'}<br>
                            Agent: ${device.agent_version || 'unknown'} • Mode: ${device.mode || 'legacy'}
                        </div>
                        <div class="device-status ${statusClass}">
                            ${statusText} ${relayBadge}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Update stats
        function updateStats() {
            const onlineCount = devices.filter(d => d.is_online).length;
            document.getElementById('deviceCount').textContent = `${onlineCount} devices online`;
        }
        
        // Select device
        function selectDevice(deviceId) {
            selectedDevice = devices.find(d => d.device_id === deviceId);
            updateDeviceList();
            
            if (selectedDevice) {
                log(`📱 Selected device: ${selectedDevice.device_name} (${selectedDevice.device_id})`);
                
                // Enable/disable connect button based on device status and mode
                const connectBtn = document.getElementById('connectBtn');
                if (selectedDevice.is_online && selectedDevice.mode === 'supabase-relay') {
                    connectBtn.disabled = false;
                } else if (!selectedDevice.is_online) {
                    connectBtn.disabled = true;
                    log('⚠️ Device is offline - cannot connect');
                } else if (selectedDevice.mode !== 'supabase-relay') {
                    connectBtn.disabled = true;
                    log('⚠️ Device uses legacy mode - only Supabase Relay agents supported');
                }
            }
        }
        
        // Connect to selected device via Supabase Realtime
        async function connectToDevice() {
            if (!selectedDevice) {
                log('❌ No device selected');
                return;
            }
            
            if (!selectedDevice.is_online) {
                log('❌ Device is offline');
                return;
            }
            
            if (selectedDevice.mode !== 'supabase-relay') {
                log('❌ Device must use Supabase Relay mode');
                return;
            }
            
            log(`🔌 Connecting to ${selectedDevice.device_name} via Supabase Realtime...`);
            log('☁️ Using pure cloud relay - no direct IP connections');
            
            updateConnectionStatus('connecting');
            
            try {
                // Create device-specific channel
                const channelName = `device_${selectedDevice.device_id}`;
                console.log(`📡 Dashboard connecting to channel: ${channelName}`);
                
                // CRITICAL FIX: Multiple fallback approaches for Supabase client
                let client = null;
                
                // Try multiple client sources
                if (window.supabaseClient) {
                    client = window.supabaseClient;
                    console.log('✅ Using window.supabaseClient');
                } else if (window.globalSupabase) {
                    client = window.globalSupabase;
                    console.log('✅ Using window.globalSupabase');
                } else if (typeof window.supabase !== 'undefined') {
                    // Create client on-demand if library is loaded
                    const supabaseUrl = 'https://ptrtibzwokjcjjxvjpin.supabase.co';
                    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB0cnRpYnp3b2tqY2pqeHZqcGluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ0MzE1NzEsImV4cCI6MjA3MDAwNzU3MX0.DPNxkQul1-13tqJ89mqYJAx7NSJjabOP4q8c6KgOnWk';
                    client = window.supabase.createClient(supabaseUrl, supabaseKey);
                    window.supabaseClient = client; // Cache for future use
                    console.log('✅ Created new Supabase client on-demand');
                }
                
                if (!client) {
                    throw new Error('Supabase client not available - library may not be loaded');
                }
                
                console.log('🔍 Client type:', typeof client);
                console.log('🔍 Client channel method:', typeof client.channel);
                
                realtimeChannel = client.channel(channelName);
                
                // Listen for responses from agent
                realtimeChannel.on('broadcast', { event: 'response' }, (payload) => {
                    console.log('📨 Received response:', payload);
                    handleAgentResponse(payload.payload);
                });
                
                // CRITICAL FIX: Listen for screen frames on same channel
                realtimeChannel.on('broadcast', { event: 'screen_frame' }, (payload) => {
                    console.log('📺 Received screen frame:', payload.payload?.data?.length || 'no data');
                    log(`📺 Screen frame received: ${payload.payload?.data?.length || 0} chars`);
                    if (payload.payload?.data) {
                        displayScreenFrame(payload.payload.data);
                    } else {
                        log('❌ Screen frame payload missing data field');
                        console.log('🔍 Full payload:', payload);
                    }
                });
                
                // ADDITIONAL FIX: Listen for all broadcast events for debugging
                realtimeChannel.on('broadcast', { event: '*' }, (payload) => {
                    console.log('🔍 All broadcast events:', payload);
                });
                
                // Subscribe to channel
                const subscribeResponse = await realtimeChannel.subscribe((status) => {
                    log(`📡 Realtime channel status: ${status}`);
                    
                    if (status === 'SUBSCRIBED') {
                        log(`✅ Connected to ${selectedDevice.device_name} via Supabase Realtime`);
                        isConnected = true;
                        updateConnectionStatus('connected');
                        
                        // Enable controls
                        document.getElementById('connectBtn').disabled = true;
                        document.getElementById('screenBtn').disabled = false;
                        document.getElementById('stopBtn').disabled = false;
                        
                        // Send ping to agent
                        sendCommand('ping', { timestamp: Date.now() });
                    }
                });
                
                if (subscribeResponse !== 'ok') {
                    throw new Error('Failed to subscribe to Realtime channel');
                }
                
            } catch (error) {
                log('❌ Connection failed: ' + error.message);
                updateConnectionStatus('disconnected');
            }
        }
        
        // Handle responses from agent
        function handleAgentResponse(response) {
            log(`📨 Agent response: ${response.type}`);
            
            switch (response.type) {
                case 'pong':
                    log('🏓 Pong received - connection verified');
                    break;
                    
                case 'status':
                    log(`📊 Agent status: ${response.data.status}`);
                    break;
                    
                case 'screen_share_started':
                    log('📺 Screen sharing started');
                    isScreenSharing = true;
                    break;
                    
                case 'screen_share_stopped':
                    log('⏹️ Screen sharing stopped');
                    isScreenSharing = false;
                    break;
                    
                case 'screen_frame':
                    displayScreenFrame(response.data.data);
                    break;
                    
                default:
                    log(`📨 Unknown response: ${response.type}`);
            }
        }
        
        // Send command to agent via Supabase Realtime
        function sendCommand(type, data = {}) {
            if (!realtimeChannel) {
                log('❌ Not connected to device');
                return;
            }
            
            const command = {
                type,
                data,
                timestamp: Date.now()
            };
            
            log(`📤 Sending command: ${type}`);
            
            realtimeChannel.send({
                type: 'broadcast',
                event: 'command',
                payload: command
            });
        }
        
        // Display screen frame
        function displayScreenFrame(base64Data) {
            console.log('🖼️ displayScreenFrame called with data length:', base64Data?.length || 'undefined');
            log(`🖼️ Processing screen frame (${base64Data?.length || 0} chars)`);
            
            if (!base64Data) {
                log('❌ No base64 data provided to displayScreenFrame');
                return;
            }
            
            const canvas = document.getElementById('screen');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            img.onload = function() {
                console.log('✅ Image loaded successfully:', img.width, 'x', img.height);
                log(`✅ Screen frame displayed: ${img.width}x${img.height}`);
                
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                // Show canvas, hide placeholder
                document.getElementById('noScreen').style.display = 'none';
                canvas.style.display = 'block';
            };
            
            img.onerror = function(error) {
                console.error('❌ Image load error:', error);
                log('❌ Failed to load screen frame image');
            };
            
            // Try different data formats
            if (base64Data.startsWith('data:image/')) {
                img.src = base64Data;
            } else {
                img.src = 'data:image/jpeg;base64,' + base64Data;
            }
        }
    
    // Start screen sharing
    function startScreenShare() {
        if (!isConnected) {
            log('❌ Not connected to device');
            return;
            }
            
            log('📺 Starting screen sharing via Supabase Realtime...');
            sendCommand('start_screen_share');
        }
        
        // Stop screen sharing
        function stopScreenShare() {
            if (!isConnected) {
                log('❌ Not connected to device');
                return;
            }
            
            log('⏹️ Stopping screen sharing...');
            sendCommand('stop_screen_share');
            
            // Clear screen
            const canvas = document.getElementById('screen');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('noScreen').style.display = 'block';
            canvas.style.display = 'none';
        }
        
        // Disconnect
        function disconnect() {
            if (realtimeChannel) {
                realtimeChannel.unsubscribe();
                realtimeChannel = null;
            }
            
            isConnected = false;
            isScreenSharing = false;
            updateConnectionStatus('disconnected');
            
            // Reset controls
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('screenBtn').disabled = true;
            document.getElementById('stopBtn').disabled = true;
            
            // Clear screen
            const canvas = document.getElementById('screen');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('noScreen').style.display = 'block';
            canvas.style.display = 'none';
        }
        
        // Update connection status
        function updateConnectionStatus(status) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.className = 'connection-status';
            
            switch (status) {
                case 'connected':
                    statusEl.classList.add('status-connected');
                    statusEl.textContent = `✅ Connected to ${selectedDevice.device_name} via Supabase Relay`;
                    break;
                case 'connecting':
                    statusEl.classList.add('status-connecting');
                    statusEl.textContent = '🔄 Connecting via Supabase Realtime...';
                    break;
                default:
                    statusEl.classList.add('status-disconnected');
                    statusEl.textContent = '🔌 Not Connected';
            }
        }
        
        // CRITICAL FIX: Direct realtime setup using window.supabaseClient
        function setupRealtimeUpdatesDirectly() {
            console.log('📡 Setting up realtime updates using direct Supabase client...');
            
            try {
                const channel = window.supabaseClient
                    .channel('remote_devices_changes')
                    .on('postgres_changes', 
                        { event: '*', schema: 'public', table: 'remote_devices' },
                        (payload) => {
                            console.log('📡 Device update received via realtime');
                            loadDevicesDirectly();
                        }
                    )
                    .subscribe();
                    
                console.log('✅ Realtime updates configured successfully');
                
            } catch (error) {
                console.error('❌ Failed to setup realtime updates:', error);
            }
        }
        
        // Legacy realtime setup function (kept for compatibility)
        function setupRealtimeUpdates() {
            console.log('🔄 Legacy setupRealtimeUpdates called - redirecting to setupRealtimeUpdatesDirectly...');
            setupRealtimeUpdatesDirectly();
        }
        
        // Mouse control via Supabase Realtime
        document.getElementById('screen').addEventListener('mousemove', function(e) {
            if (!isConnected || !isScreenSharing) return;
            
            const rect = this.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) * (1280 / rect.width));
            const y = Math.round((e.clientY - rect.top) * (720 / rect.height));
            
            sendCommand('mouse_move', { x, y });
        });
        
        document.getElementById('screen').addEventListener('click', function(e) {
            if (!isConnected || !isScreenSharing) return;
            
            const rect = this.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) * (1280 / rect.width));
            const y = Math.round((e.clientY - rect.top) * (720 / rect.height));
            
            sendCommand('mouse_click', { x, y, button: 'left' });
            
            log(`🖱️ Mouse clicked at (${x}, ${y}) via Supabase Relay`);
        });
        
        // Logging
        function log(message) {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `${time}: ${message}\n`;
            logEl.scrollTop = logEl.scrollHeight;
            console.log(message);
        }
        
        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
