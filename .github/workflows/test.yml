name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - 'controller/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'agent/**'
      - 'controller/**'
      - '.github/workflows/test.yml'

permissions:
  contents: read

jobs:
  test-agent:
    name: Agent tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: agent/go.sum

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev xorg-dev

      - name: Go vet
        working-directory: agent
        run: |
          # Tests + non-CGO code should vet clean
          go vet ./internal/state/... ./internal/metrics/... ./internal/version/... ./pkg/logging/...

      - name: Run tests (Linux, CGO=0)
        if: runner.os == 'Linux'
        working-directory: agent
        env:
          CGO_ENABLED: '0'
        run: |
          # On Linux without MinGW, skip CGO-requiring packages. State + metrics + screen
          # privacy tests pass without CGO.
          go test -count=1 -v ./internal/state/... ./internal/metrics/... ./internal/screen/...

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        working-directory: agent
        run: |
          go test -count=1 -v ./internal/state/... ./internal/metrics/... ./internal/screen/... ./internal/input/... ./internal/clipboard/...

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        working-directory: agent
        run: |
          go test -count=1 -v ./internal/state/... ./internal/metrics/... ./internal/input/...

  test-controller:
    name: Controller tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: controller/go.sum

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libgl1-mesa-dev xorg-dev

      - name: Run tests
        working-directory: controller
        run: |
          # Viewer + updater have unit tests — skip the full app (Wails build-tagged)
          go test -count=1 -v ./internal/updater/... ./internal/viewer/...
